services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: yantra
      POSTGRES_PASSWORD: yantra
      POSTGRES_DB: yantra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yantra -d yantra"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://yantra:yantra@db:5432/yantra
      PORT: "3100"
      SERVE_UI: "true"
      YANTRA_DEPLOYMENT_MODE: "authenticated"
      YANTRA_DEPLOYMENT_EXPOSURE: "private"
      YANTRA_PUBLIC_URL: "${YANTRA_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - yantra-data:/yantra
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  yantra-data:
